<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact - Instant Éternel</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body class="contact-page">

<header class="site-header">
  <div class="hamburger" id="hamburger">
    <span></span><span></span><span></span>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <nav>
      <a href="index.html">Accueil</a>
      <a href="portfolio.html">Portfolio</a>
      <a href="tarifs.html">Tarifs</a>
      <a href="avis.html">Avis</a>
    </nav>
  </div>
</header>

<main class="contact-container">
  
  <div class="contact-left-side">
    <section class="contact-header-zone">
      <h1 class="contact-title">Contact</h1>
      <div class="contact-underline"></div>
    </section>

    <section class="contact-infos">
      <div class="info-block">
        <p class="contact-label">Facebook</p>
        <p class="contact-text">Instant Éternel</p>
      </div>
      <div class="info-block">
        <p class="contact-label">Instagram</p>
        <p class="contact-text">brique__chloe_photographe</p>
      </div>
      <div class="info-block">
        <p class="contact-label">Mail</p>
        <p class="contact-text">brique.chloe.photographe@gmail.com</p>
      </div>
    </section>
  </div>

  <div class="contact-separator">
    <div class="line line-a"></div>
    <div class="line line-b"></div>
  </div>

  <section class="contact-right-side">
    <div class="contact-form-wrap">
      <div 
        class="typeform-embed" 
        data-tf-widget="kdTcxvpf"
        data-tf-opacity="100"
        data-tf-transparent="true"
        data-tf-auto-resize="true">
      </div>
    </div>
  </section>

</main>

<script src="https://embed.typeform.com/next/embed.js"></script>
<script src="script.js" defer></script>
</body>
</html>
